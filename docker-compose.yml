version: '3.8'

services:
  backend:
    build: 
      context: ./backend
    env_file:
      - .env
    environment:
      - DB_HOST=${host_user}           
      - DB_PORT=5432
      - DB_USER=${user}                
      - DB_PASSWORD=${password}        
      - DB_NAME=${database_name}       
      - JWT_SECRET=${jwt_secret}      
      - NODE_ENV=development
      - PORT=53493
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=${user}         
      - POSTGRES_PASSWORD=${password}  
      - POSTGRES_DB=${database_name}   
    volumes:
      - ./edi_data:/var/lib/postgresql/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_USER_API: ${VITE_USER_API}
        VITE_GUEST_API: ${VITE_GUEST_API}
        VITE_ADMIN_API: ${VITE_ADMIN_API}
        VITE_COLLABORATOR_API: ${VITE_COLLABORATOR_API}
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "9099:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
